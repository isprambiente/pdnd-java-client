name: Java Security Audit

on:
  schedule:
    - cron: "0 4 * * *"   # ogni notte alle 4:00 UTC
  workflow_dispatch:       # opzionale: permette di avviare il workflow anche a mano

jobs:
  test:
    name: Run tests on Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ '21', '25' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      # Maven
      - name: Build & Test with Maven
        if: ${{ hashFiles('pom.xml') != '' }}
        run: mvn -B clean test

      # Gradle (Groovy o Kotlin DSL)
      - name: Build & Test with Gradle
        if: ${{ hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != '' }}
        run: ./gradlew clean test
